<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #eef2f7; }
    .card { border-radius: 16px; border: none; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }
    .btn-primary { background: #4f46e5; border: none; }
    .btn-primary:hover { background: #4338ca; }
    #result-box { display: none; font-size: 1.3rem; font-weight: 600; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <h3 class="text-center mb-1">🎓 Student Performance</h3>
          <p class="text-center text-muted mb-4" style="font-size:14px">Prediction System</p>

          <div class="mb-3">
            <label class="form-label fw-semibold">Study Hours per Day</label>
            <input type="number" id="study_hours" class="form-control" placeholder="e.g. 6" min="0" max="24">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Attendance (%)</label>
            <input type="number" id="attendance" class="form-control" placeholder="e.g. 85" min="0" max="100">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Previous Grade (out of 100)</label>
            <input type="number" id="prev_grade" class="form-control" placeholder="e.g. 72" min="0" max="100">
          </div>

          <button onclick="predict()" class="btn btn-primary w-100 py-2">Predict Performance</button>

          <div id="result-box" class="text-center"></div>
          <div id="error-box" class="text-danger text-center mt-3" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://student-prediction-api-pxih.onrender.com";

    async function predict() {
      const study_hours = document.getElementById('study_hours').value;
      const attendance  = document.getElementById('attendance').value;
      const prev_grade  = document.getElementById('prev_grade').value;
      const resultBox   = document.getElementById('result-box');
      const errorBox    = document.getElementById('error-box');

      resultBox.style.display = 'none';
      errorBox.style.display  = 'none';

      if (!study_hours || !attendance || !prev_grade) {
        errorBox.style.display = 'block';
        errorBox.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            study_hours: parseFloat(study_hours),
            attendance:  parseFloat(attendance),
            prev_grade:  parseFloat(prev_grade)
          })
        });

        const data = await response.json();
        resultBox.style.display = 'block';

        if (data.prediction === 'Pass') {
          resultBox.innerHTML = '✅ Result: <span style="color:#16a34a">Pass</span>';
        } else {
          resultBox.innerHTML = '❌ Result: <span style="color:#dc2626">Fail</span>';
        }
      } catch (err) {
        errorBox.style.display = 'block';
        errorBox.textContent = 'Could not connect to server. Try again.';
      }
    }
  </script>
</body>
</html>
